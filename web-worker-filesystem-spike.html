<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Single File Worker</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #output { background: #f4f4f4; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<h1>Web Worker (Single File)</h1>
<button id="startBtn">Calculate Prime in Background</button>
<div id="output">Worker status: Idle</div>

<!-- 1. HIDDEN WORKER SCRIPT -->
<!-- type="text/plain" prevents the browser from executing this on the main thread -->
<script id="worker-logic" type="text/plain">
    self.onmessage = function(e) {
        let num = e.data;
        let result = true;

        // Simple CPU-heavy task (checking if a number is prime)
        for (let i = 2; i <= Math.sqrt(num); i++) {
            if (num % i === 0) {
                result = false;
                break;
            }
        }

        self.postMessage({ number: num, isPrime: result });
    };
</script>

<!-- 2. MAIN THREAD SCRIPT -->
<script>
  const output = document.getElementById('output');
  const btn = document.getElementById('startBtn');
  let timer = null; // Safety net timer

  // Extract text, create Blob, and spawn Worker
  const workerCode = document.getElementById('worker-logic').textContent;
  const blob = new Blob([workerCode], { type: 'application/javascript' });
  const workerUrl = URL.createObjectURL(blob);
  let worker = new Worker(workerUrl);

  function attachHandlers() {
    worker.onmessage = (e) => {
      clearTimeout(timer); // Cancel safety net
      const { number, isPrime } = e.data;
      output.innerText = `Result: ${number} is ${isPrime ? 'PRIME' : 'NOT PRIME'}`;
    };
  }

  btn.onclick = () => {
    // const testNum = 9007199254740991; // Large prime
    const testNum = 9007199254740881; // Large prime
    // const testNum = 100000000000000003n; // Larger prime
    output.innerText = "Worker is thinking...";

    // Start 10s safety net
    clearTimeout(timer);
    timer = setTimeout(() => {
      worker.terminate();
      output.innerText = "Error: Calculation timed out after 10s.";
      worker = new Worker(workerUrl); // Re-spawn for next click
      attachHandlers();
    }, 10000);

    worker.postMessage(testNum);
  };

  attachHandlers();
</script>

</body>
</html>
