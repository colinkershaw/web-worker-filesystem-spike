<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- REQUIRED FOR MOBILE RESPONSIVENESS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Parallel Workers</title>
    <!--suppress CssUnusedSymbol -->
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            line-height: 1.6;
        }

        #container {
            display: flex;
            flex-wrap: wrap; /* Allows items to wrap on small screens */
            gap: 10px;
        }

        .output {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 4px;
            word-break: break-word;
            border: 1px solid #ddd;
            flex: 1 1 300px; /* Grows, shrinks, and sets a 300px base width */
            box-sizing: border-box;
        }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; width: 100%; max-width: 200px; }
    </style>
</head>
<body>

<h1>Dynamic Workers + Progress</h1>
<label for="timeoutInput">Timeout (ms)</label><input id="timeoutInput" type="number" value="10000" placeholder="Timeout (ms)">
<button id="startBtn">Start Workers</button>
<div id="container"></div>

<script id="worker-logic" type="text/plain">
    self.onmessage = function(e) {
        let num = BigInt(e.data);
        function bigSqrt(value) {
            let x = value / 2n + 1n;
            let y = (x + value / x) / 2n;
            while (y < x) { x = y; y = (x + value / x) / 2n; }
            return x;
        }

        const limit = bigSqrt(num);
        // Report progress every 1,000,000 iterations to avoid slowing down the UI
        for (let i = 2n; i <= limit; i++) {
            if (i % 1000000n === 0n) {
                self.postMessage({ type: 'progress', percent: Number((i * 100n) / limit) });
            }
            if (num % i === 0n) {
                    self.postMessage({ type: 'result', number: num, isPrime: false });
                    self.close(); // Kills the worker thread instantly
                    return;
            }
        }
        self.postMessage({ type: 'result', number: num, isPrime: true });
    };
</script>

<script>
  const btn = document.getElementById('startBtn');
  const container = document.getElementById('container');
  const workerCode = document.getElementById('worker-logic').textContent;
  const workerUrl = URL.createObjectURL(new Blob([workerCode], {type: 'application/javascript'}));

  // Add or remove numbers here; the UI will adapt automatically
  const numbers = [12345678910987654321n, 999999999999989n, 179426549n, 104729n, 7n, 1234567890n];

  let workers = [];
  let timers = [];
  let timeout = 0;

  function initUI() {
    container.innerHTML = '';
    numbers.forEach((_, i) => {
      const div = document.createElement('div');
      div.id = `output${i}`;
      div.className = 'output';
      div.innerText = `Worker ${i + 1}: Idle`;
      container.appendChild(div);
    });
  }

   function runWorker(num, i) {
    if (workers[i]) workers[i].terminate();

    const worker = new Worker(workerUrl);
    const out = document.getElementById(`output${i}`);
    workers[i] = worker;

    worker.onmessage = (e) => {
      if (e.data.type === 'progress') {
        out.innerText = `Worker ${i + 1}: Checking... ${e.data.percent}%`;
      } else {
        clearTimeout(timers[i]);
        out.innerText = `Worker ${i + 1} Result: ${e.data.number} is ${e.data.isPrime ? 'PRIME' : 'NOT PRIME'}`;
      }
    };

    clearTimeout(timers[i]);
    timers[i] = setTimeout(() => {
      workers[i].terminate();
      out.innerText = `Worker ${i + 1} Error: Timed out.`;
    }, timeout);

    worker.postMessage(num);
  }

  btn.onclick = () => {
    timeout = document.getElementById('timeoutInput').valueAsNumber;
    initUI();
    numbers.forEach((num, i) => runWorker(num, i));
  };

  initUI(); // Initialize display on load
</script>
</body>
</html>
