<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Parallel Web Workers with Progress</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .output { background: #f4f4f4; padding: 10px; border-radius: 4px; margin-top: 10px; word-break: break-all; border: 1px solid #ddd; }
    </style>
</head>
<body>

<h1>Parallel Workers + Progress</h1>
<button id="startBtn">Start 3 Workers</button>
<div id="output1" class="output">Worker 1: Idle</div>
<div id="output2" class="output">Worker 2: Idle</div>
<div id="output3" class="output">Worker 3: Idle</div>

<script id="worker-logic" type="text/plain">
    self.onmessage = function(e) {
        let num = BigInt(e.data);
        let result = true;

        function bigSqrt(value) {
            let x = value / 2n + 1n;
            let y = (x + value / x) / 2n;
            while (y < x) { x = y; y = (x + value / x) / 2n; }
            return x;
        }

        const limit = bigSqrt(num);
        // Report progress every 1,000,000 iterations to avoid slowing down the UI
        for (let i = 2n; i <= limit; i++) {
            if (i % 1000000n === 0n) {
                self.postMessage({ type: 'progress', percent: Number((i * 100n) / limit) });
            }
            if (num % i === 0n) { result = false; break; }
        }
        self.postMessage({ type: 'result', number: num, isPrime: result });
    };
</script>

<script>
  const btn = document.getElementById('startBtn');
  const workerCode = document.getElementById('worker-logic').textContent;
  const workerUrl = URL.createObjectURL(new Blob([workerCode], {type: 'application/javascript'}));

  let workers = [null, null, null];
  let timers = [null, null, null];

  function spawnWorker(index) {
    if (workers[index]) workers[index].terminate();
    const w = new Worker(workerUrl);
    const out = document.getElementById(`output${index + 1}`);

    w.onmessage = (e) => {
      if (e.data.type === 'progress') {
        out.innerText = `Worker ${index + 1} Thinking... (${e.data.percent}%)`;
      } else {
        clearTimeout(timers[index]);
        const {number, isPrime} = e.data;
        out.innerText = `Worker ${index + 1} Result: ${number} is ${isPrime ? 'PRIME' : 'NOT PRIME'}`;
      }
    };
    workers[index] = w;
  }

  btn.onclick = () => {
    // Numbers: Massive (timeout test), Medium, Small
    const numbers = [12345678910987654321n, 999999999999989n, 179426549n];

    numbers.forEach((num, i) => {
      const out = document.getElementById(`output${i + 1}`);
      out.innerText = `Worker ${i + 1} starting...`;

      spawnWorker(i);

      clearTimeout(timers[i]);
      timers[i] = setTimeout(() => {
        workers[i].terminate();
        out.innerText = `Worker ${i + 1} Error: Timed out.`;
      }, 10000);

      workers[i].postMessage(num);
    });
  };

  [0, 1, 2].forEach(i => spawnWorker(i));
</script>
</body>
</html>
